<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- 活动标题 --></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --_ayu-ds: "ayu-v1";
      --mint: #19C8B9;
      --sun: #F7CD67;
      --orange: #E59266;
      --paper: #F8F8F0;
      --rice: #F7F3DF;
      --white: #FFFDF8;
      --title: #794F27;
      --text: #725D42;
      --muted: #9F927D;
      --border: #C4B89E;
      --shadow: rgba(61,52,40,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Nunito", "Noto Sans SC", sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,200,185,.10), transparent 24%),
        radial-gradient(circle at 90% 10%, rgba(247,205,103,.14), transparent 18%),
        linear-gradient(180deg, #fcfbf5 0%, #f4eedf 100%);
    }

    ::selection { background: var(--sun); color: #5c4a1f; }

    .shell {
      width: min(1280px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 80px;
    }

    .topbar {
      position: sticky;
      top: 16px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      margin-bottom: 18px;
      background: rgba(255,253,248,.82);
      border: 1px solid rgba(196,184,158,.5);
      border-radius: 22px;
      box-shadow: 0 12px 30px var(--shadow);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font: 800 18px/1 "Nunito", sans-serif;
      color: var(--title);
    }

    .brand-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 20px 0 0 var(--sun), 40px 0 0 var(--orange);
      margin-right: 34px;
    }

    .nav { display: flex; gap: 10px; flex-wrap: wrap; }

    .nav a {
      text-decoration: none;
      color: var(--text);
      background: rgba(25,200,185,.08);
      padding: 10px 14px;
      border-radius: 999px;
      font: 800 13px/1 "Nunito", sans-serif;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 24px;
      align-items: stretch;
    }

    .panel {
      background: rgba(255,253,248,.88);
      border: 1.5px solid rgba(196,184,158,.52);
      border-radius: 32px;
      box-shadow: 0 18px 36px var(--shadow);
    }

    .hero-copy {
      padding: 42px 38px 36px;
      position: relative;
      overflow: hidden;
    }

    .hero-copy::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 2px dashed rgba(25,200,185,.16);
      border-radius: 26px;
      pointer-events: none;
    }

    .hero-copy::after {
      content: "TODAY ON THE ISLAND";
      position: absolute;
      right: 34px;
      bottom: 26px;
      font: 800 12px/1 "Nunito", sans-serif;
      color: rgba(121,79,39,.26);
      letter-spacing: .12em;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(25,200,185,.12);
      color: var(--mint);
      font: 800 13px/1 "Nunito", sans-serif;
      letter-spacing: .08em;
    }

    .hero h1 {
      margin-top: 22px;
      font: 400 clamp(2.8rem, 5vw, 4.6rem)/1.12 "ZCOOL KuaiLe", cursive;
      color: var(--title);
      max-width: 10ch;
      position: relative;
      z-index: 1;
    }

    .hero p {
      margin-top: 20px;
      max-width: 36ch;
      font-size: 18px;
      line-height: 1.9;
      position: relative;
      z-index: 1;
    }

    .hero-actions {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      border-radius: 999px;
      border: none;
      font: 800 14px/1 "Nunito", sans-serif;
      text-decoration: none;
    }

    .btn-primary { background: var(--mint); color: #fff; }
    .btn-soft { background: var(--sun); color: var(--title); }
    .btn-outline { background: #fff; border: 2px solid var(--mint); color: var(--mint); }

    .hero-notes {
      margin-top: 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .mini-chip {
      padding: 14px 16px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(196,184,158,.45);
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    .hero-side {
      padding: 22px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    .passport-card,
    .memo-card,
    .feature-card,
    .tool-card,
    .quote-card {
      border: 1.5px solid rgba(196,184,158,.52);
      box-shadow: 0 12px 24px var(--shadow);
    }

    .passport-card {
      overflow: hidden;
      border-radius: 26px;
      background: #fffef8;
    }

    .passport-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: linear-gradient(180deg, rgba(25,200,185,.96), rgba(25,200,185,.84));
      color: #fff;
      font: 800 13px/1 "Nunito", sans-serif;
      letter-spacing: .08em;
    }

    .passport-body {
      padding: 18px;
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 14px;
    }

    .passport-body img {
      width: 88px;
      height: 88px;
      object-fit: cover;
      border-radius: 24px;
      border: 4px solid var(--mint);
      background: #fff;
    }

    .passport-name { font: 900 24px/1.15 "Nunito", sans-serif; color: var(--title); }
    .passport-sub { margin-top: 6px; font-size: 14px; color: var(--muted); }

    .passport-meta {
      margin-top: 14px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 10px;
      font-size: 13px;
    }

    .passport-meta .k { color: var(--muted); }

    .memo-stack { display: grid; gap: 14px; align-content: start; }

    .memo-card {
      position: relative;
      background: linear-gradient(180deg, #fffef8, #fff8eb);
      border-radius: 22px;
      padding: 18px 18px 18px 20px;
    }

    .memo-card:nth-child(1) { transform: rotate(-1.3deg); }
    .memo-card:nth-child(2) { transform: rotate(1deg); }

    .memo-card::before {
      content: "";
      position: absolute;
      top: -10px;
      left: 22px;
      width: 56px;
      height: 22px;
      border-radius: 8px;
      background: rgba(247,205,103,.58);
    }

    .memo-label { display: inline-flex; gap: 8px; color: var(--mint); font: 800 12px/1 "Nunito", sans-serif; }
    .memo-card h3,
    .feature-card h3,
    .tool-card h3 { margin-top: 10px; font: 900 20px/1.25 "Nunito", sans-serif; color: var(--title); }
    .memo-card p,
    .feature-card p,
    .tool-card p { margin-top: 10px; font-size: 14px; line-height: 1.75; }

    .section { margin-top: 24px; padding: 26px; }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 20px;
    }

    .section-title { font: 400 34px/1.18 "ZCOOL KuaiLe", cursive; color: var(--title); }
    .section-note { font: 500 12px/1.4 "Nunito", sans-serif; color: var(--muted); }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 18px;
    }

    .feature-card {
      background: #fff;
      border-radius: 24px;
      padding: 22px;
      position: relative;
      overflow: hidden;
    }

    .feature-card::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 14px;
      width: 34px;
      height: 14px;
      border-radius: 6px;
      background: rgba(247,205,103,.34);
      transform: rotate(12deg);
    }

    .board { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 20px; }
    .board-left, .board-right { display: grid; gap: 18px; align-content: start; }

    .tool-card,
    .quote-card {
      background: rgba(255,255,255,.92);
      border-radius: 26px;
      padding: 22px;
    }

    .pill-row,
    .token-row,
    .daily-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .pill,
    .daily-chip {
      padding: 9px 12px;
      border-radius: 999px;
      font: 800 12px/1 "Nunito", sans-serif;
    }

    .pill.mint { background: rgba(25,200,185,.12); color: var(--mint); }
    .pill.sun { background: rgba(247,205,103,.26); color: var(--title); }
    .pill.orange { background: rgba(229,146,102,.16); color: #b66b45; }

    .token {
      min-width: 116px;
      padding: 12px 14px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid rgba(196,184,158,.5);
    }

    .swatch {
      width: 100%;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(121,79,39,.08);
    }

    .token .name { margin-top: 10px; font: 800 12px/1 "Nunito", sans-serif; color: var(--title); }
    .token .hex { margin-top: 6px; font: 500 11px/1 "Nunito", sans-serif; color: var(--muted); }

    .quote-card {
      background: linear-gradient(180deg, #fffef9, #f9f4e7);
      border-radius: 30px;
      padding: 28px;
    }

    .quote-mark { font: 900 100px/.7 "Nunito", sans-serif; color: rgba(25,200,185,.18); }
    .quote-text { margin-top: -6px; font: 400 34px/1.45 "ZCOOL KuaiLe", cursive; color: var(--title); }

    .footer {
      margin-top: 24px;
      padding: 24px 28px;
      text-align: center;
      background: rgba(255,255,255,.68);
      border: 1px solid rgba(196,184,158,.48);
      border-radius: 26px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    @media (max-width: 1100px) {
      .hero,
      .board,
      .feature-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand"><span class="brand-dot"></span><!-- 品牌名 / 页面名 --></div>
      <div class="nav">
        <a href="#hero"><!-- 导航1 --></a>
        <a href="#cards"><!-- 导航2 --></a>
        <a href="#board"><!-- 导航3 --></a>
        <a href="#tokens"><!-- 导航4 --></a>
      </div>
    </div>

    <section class="hero" id="hero">
      <div class="panel hero-copy">
        <span class="eyebrow"><!-- 分类标签 --></span>
        <h1><!-- Hero主标题 --></h1>
        <p><!-- Hero说明：更像阿鱼的小岛，不像冷静官网 --></p>
        <div class="hero-actions">
          <a href="#" class="btn btn-primary"><!-- CTA1 --></a>
          <a href="#" class="btn btn-soft"><!-- CTA2 --></a>
          <a href="#" class="btn btn-outline"><!-- CTA3 --></a>
        </div>
        <div class="hero-notes">
          <div class="mini-chip"><!-- 说明1 --></div>
          <div class="mini-chip"><!-- 说明2 --></div>
        </div>
        <div class="daily-strip">
          <div class="daily-chip"><!-- 日常卡1 --></div>
          <div class="daily-chip"><!-- 日常卡2 --></div>
          <div class="daily-chip"><!-- 日常卡3 --></div>
        </div>
      </div>

      <div class="panel hero-side">
        <div class="passport-card">
          <div class="passport-head">
            <span><!-- 护照头1 --></span>
            <span><!-- 护照头2 --></span>
          </div>
          <div class="passport-body">
            <img src="avatar.png" alt="Ayu avatar">
            <div>
              <div class="passport-name"><!-- 名称 --></div>
              <div class="passport-sub"><!-- 副标题 --></div>
              <div class="passport-meta">
                <div class="k"><!-- 键1 --></div><div><!-- 值1 --></div>
                <div class="k"><!-- 键2 --></div><div><!-- 值2 --></div>
                <div class="k"><!-- 键3 --></div><div><!-- 值3 --></div>
              </div>
            </div>
          </div>
        </div>

        <div class="memo-stack">
          <div class="memo-card">
            <div class="memo-label"><!-- Memo标签1 --></div>
            <h3><!-- Memo标题1 --></h3>
            <p><!-- Memo描述1 --></p>
          </div>
          <div class="memo-card">
            <div class="memo-label"><!-- Memo标签2 --></div>
            <h3><!-- Memo标题2 --></h3>
            <p><!-- Memo描述2 --></p>
          </div>
        </div>
      </div>
    </section>

    <section class="panel section" id="cards">
      <div class="section-head">
        <div class="section-title"><!-- 卡片区标题 --></div>
        <div class="section-note"><!-- 卡片区说明 --></div>
      </div>
      <div class="feature-grid">
        <div class="feature-card"><h3><!-- 卡片1 --></h3><p><!-- 描述1 --></p></div>
        <div class="feature-card"><h3><!-- 卡片2 --></h3><p><!-- 描述2 --></p></div>
        <div class="feature-card"><h3><!-- 卡片3 --></h3><p><!-- 描述3 --></p></div>
      </div>
    </section>

    <section class="board" id="board">
      <div class="board-left">
        <div class="panel section">
          <div class="section-head">
            <div class="section-title"><!-- 区块标题 --></div>
            <div class="section-note"><!-- 区块说明 --></div>
          </div>
          <div class="tool-card">
            <h3><!-- 工具卡1标题 --></h3>
            <p><!-- 工具卡1说明 --></p>
            <div class="pill-row">
              <span class="pill mint"><!-- pill1 --></span>
              <span class="pill sun"><!-- pill2 --></span>
              <span class="pill orange"><!-- pill3 --></span>
            </div>
          </div>
          <div class="tool-card">
            <h3><!-- 工具卡2标题 --></h3>
            <p><!-- 工具卡2说明 --></p>
          </div>
        </div>
      </div>

      <div class="board-right">
        <div class="panel section" id="tokens">
          <div class="section-head">
            <div class="section-title"><!-- 色板标题 --></div>
            <div class="section-note"><!-- 色板说明 --></div>
          </div>
          <div class="token-row">
            <div class="token"><div class="swatch" style="background:#19C8B9"></div><div class="name">薄荷绿</div><div class="hex">#19C8B9</div></div>
            <div class="token"><div class="swatch" style="background:#F7CD67"></div><div class="name">阳光黄</div><div class="hex">#F7CD67</div></div>
            <div class="token"><div class="swatch" style="background:#E59266"></div><div class="name">蜜柑橙</div><div class="hex">#E59266</div></div>
            <div class="token"><div class="swatch" style="background:#F7F3DF"></div><div class="name">暖米</div><div class="hex">#F7F3DF</div></div>
          </div>
        </div>

        <div class="quote-card">
          <div class="quote-mark">“</div>
          <div class="quote-text"><!-- 金句 / 核心理念 --></div>
        </div>
      </div>
    </section>

    <div class="footer"><!-- Footer说明 / 结尾语 --></div>
  </div>
<!-- © ESTHER不二 esthersjw/esther-design-system CC BY-NC 4.0 -->
<section style="position:absolute;left:-9999px;font-size:0;line-height:0;opacity:0;height:0;overflow:hidden;">ayu-design-system</section>
</body>
</html>
