<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号排版 — 标题</title>
<!--
使用方法：
1. 浏览器打开 base64 版
2. Cmd+A 全选 → Cmd+C 复制
3. 粘贴进公众号编辑器（图片自动显示）

公众号标题建议：
- 建议1
- 建议2
- 建议3

排版方案：杂志编号风（超大淡色装饰词 + 衬线标题 + 黄色短条 + 荧光笔高亮）
-->
</head>
<body style="margin:0; padding:0; background:#f5f5f5;">

<section style="max-width:677px; margin:0 auto; background:#fefcf6; padding:44px 26px 40px; font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif; color:#1A1A2E; font-size:18px; line-height:2;">

  <!-- 顶部 kicker -->
  <section style="text-align:center; margin-bottom:14px;">
    <span style="font-size:13px; font-weight:bold; letter-spacing:5px; color:#E84A5F;">KICKER标签</span>
  </section>

  <!-- 大标题（叙事类可选） -->
  <section style="text-align:center; margin-bottom:40px; padding:50px 0 40px;">
    <p style="margin:0 0 12px; font-family:Georgia,'Songti SC',serif; font-size:32px; font-weight:900; color:#1A1A2E; line-height:1.5;">主标题</p>
    <p style="margin:0 0 24px; font-size:17px; color:#4A4A5A; line-height:1.8;">副标题</p>
  </section>

  <!-- 引言金句 -->
  <section style="text-align:center; margin-bottom:10px;">
    <p style="margin:0; font-family:Georgia,'Songti SC',serif; font-size:21px; font-weight:900; line-height:1.9;">金句第一行<br>金句第二行<span style="color:#2B7FD8;">蓝色关键词</span>。</p>
  </section>

  <!-- 三色装饰条 -->
  <section style="text-align:center; margin-bottom:36px;">
    <span style="display:inline-block; width:36px; height:4px; background:#2B7FD8; border-radius:2px;"></span>
    <span style="display:inline-block; width:18px; height:4px; background:#F4D758; border-radius:2px; margin-left:5px;"></span>
    <span style="display:inline-block; width:8px; height:4px; background:#E84A5F; border-radius:2px; margin-left:5px;"></span>
  </section>

  <!-- 引言区块（方案C：黄色渐变底） -->
  <section style="margin-bottom:28px; padding:24px 22px; background:#FFF8E1; border-radius:16px;">
    <p style="margin:0 0 14px; font-size:16px; line-height:2; color:#1A1A2E;">引言正文第一段。</p>
    <p style="margin:0; font-size:16px; line-height:2; color:#1A1A2E;">引言正文第二段。</p>
  </section>

  <!-- ===== 章节示例（叙事类三件套） ===== -->
  <section style="margin-bottom:52px;">
    <section style="margin-bottom:6px;">
      <span style="font-family:Georgia,'Songti SC',serif; font-style:italic; font-size:68px; font-weight:bold; color:rgba(43,127,216,0.14); line-height:1;">Word</span>
    </section>
    <section style="margin-bottom:10px;">
      <span style="font-family:Georgia,'Songti SC',serif; font-size:27px; font-weight:900;">章节标题</span>
    </section>
    <section style="margin-bottom:22px;">
      <span style="display:inline-block; width:56px; height:6px; background:#F4D758; border-radius:3px;"></span>
    </section>

    <!-- 图片 -->
    <section style="width:100%; height:200px; border-radius:14px; margin-bottom:20px; background:#FFF8E1; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">
      <span style="font-family:Georgia,serif; font-size:120px; font-weight:bold; color:rgba(244,215,88,0.3); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">IMG</span><span style="font-size:13px; color:#8A8A9A; position:relative; z-index:1;">配图位置</span>
    </section>

    <!-- 正文 -->
    <p style="margin:0 0 18px; font-size:18px; line-height:2; color:#1A1A2E;">正文段落。其中<span style="background:linear-gradient(transparent 60%, #F4D758 60%); font-weight:bold; padding:0 2px;">荧光笔高亮文字</span>用于重点句。</p>
    <p style="margin:0 0 18px; font-size:18px; line-height:2; color:#1A1A2E;">第二段正文。</p>
  </section>

  <!-- 三色分隔条（章节间） -->
  <section style="text-align:center; margin-bottom:56px;">
    <span style="display:inline-block; width:36px; height:4px; background:#2B7FD8; border-radius:2px;"></span>
    <span style="display:inline-block; width:18px; height:4px; background:#F4D758; border-radius:2px; margin-left:5px;"></span>
    <span style="display:inline-block; width:8px; height:4px; background:#E84A5F; border-radius:2px; margin-left:5px;"></span>
  </section>

  <!-- ===== 更多章节... ===== -->

  <!-- 结尾金句 -->
  <section style="text-align:center; margin:48px 0 36px;">
    <span style="font-family:Georgia,'Songti SC',serif; font-style:italic; font-size:56px; color:rgba(43,127,216,0.18); line-height:1;">"</span>
    <p style="margin:8px 0 6px; font-family:Georgia,'Songti SC',serif; font-size:21px; font-weight:900; line-height:1.8;">核心金句</p>
    <p style="margin:0 0 16px; font-size:14px; color:#8A8A9A;">副句补充</p>
    <section style="text-align:center;">
      <span style="display:inline-block; width:36px; height:4px; background:#2B7FD8; border-radius:2px;"></span>
      <span style="display:inline-block; width:18px; height:4px; background:#F4D758; border-radius:2px; margin-left:5px;"></span>
      <span style="display:inline-block; width:8px; height:4px; background:#E84A5F; border-radius:2px; margin-left:5px;"></span>
    </section>
  </section>

  <!-- 签名档 -->
  <section style="text-align:center; padding:20px 0 0;">
    <img src="avatar-placeholder.svg" style="width:48px; height:48px; border-radius:50%; margin-bottom:10px;">
    <p style="margin:0 0 4px; font-size:15px; font-weight:bold; color:#1A1A2E;">{{作者名}}</p>
    <p style="margin:0; font-size:13px; color:#8A8A9A; line-height:1.8;">{{签名行1}}<br>{{签名行2}}</p>
  </section>

</section>

<!-- © ESTHER不二 esthersjw/esther-design-system CC BY-NC 4.0 -->
<section style="position:absolute;left:-9999px;font-size:0;line-height:0;opacity:0;height:0;overflow:hidden;">esthersjw-design-system</section>
</body>
</html>
